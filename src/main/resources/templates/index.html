<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task Manager</title>
    <style>
        body {
            font-family: Arial;
            background: #121212;
            color: white;
            text-align: center;
        }
        .container {
            width: 50%;
            margin: auto;
        }
        input, button {
            padding: 10px;
            margin: 5px;
        }
        .task {
            background: #1e1e1e;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
        }
        .completed {
            text-decoration: line-through;
            color: gray;
        }
        a {
            margin: 5px;
            color: cyan;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>RESTful Task Management API using Spring Boot</h1>

    <!-- Add Task -->
    <form action="/add" method="post">
        <input type="text" name="title" placeholder="Task Title" required />
        <input type="text" name="description" placeholder="Description" />
        <button type="submit">Add</button>
    </form>

    <!-- Task List -->
    <div th:each="task : ${tasks}" class="task">
        <span th:classappend="${task.completed} ? 'completed' : ''">
            <b th:text="${task.title}"></b> - 
            <span th:text="${task.description}"></span>
        </span>
        <br/>
        <a th:href="@{/toggle/{id}(id=${task.id})}">✔ Toggle</a>
        <a th:href="@{/delete/{id}(id=${task.id})}">❌ Delete</a>
    </div>

</div>

</body>
</html>
